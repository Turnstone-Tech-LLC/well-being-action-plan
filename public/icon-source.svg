<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with UVM Catamount Green -->
  <circle cx="256" cy="256" r="256" fill="#154734"/>

  <!-- Safe area circle (slightly lighter green for depth) -->
  <circle cx="256" cy="256" r="200" fill="#1a5a40"/>

  <!-- Heart symbol representing well-being (classic heart shape) -->
  <g transform="translate(256, 230) scale(1.8)">
    <path d="M 0,15
             C -20,15 -35,0 -35,-15
             C -35,-30 -25,-40 -17.5,-40
             C -10,-40 0,-30 0,-20
             C 0,-30 10,-40 17.5,-40
             C 25,-40 35,-30 35,-15
             C 35,0 20,15 0,35
             C -20,15 -35,0 -35,-15"
          fill="#ffffff"/>
  </g>

  <!-- Plus sign overlay (wellness/healthcare symbol) -->
  <g transform="translate(256, 340)">
    <rect x="-40" y="-8" width="80" height="16" rx="4" fill="#ffffff"/>
    <rect x="-8" y="-40" width="16" height="80" rx="4" fill="#ffffff"/>
  </g>
</svg>
